openapi: 3.1.0
info:
  title: Miro Board Tools API
  description: |
    REST API for managing Miro boards — create sticky notes, shapes, bulk items, manage board access and sharing.
    This API wraps the Miro REST API with convenient presets (e.g., named sticky note sizes).
  version: 0.3.8

servers:
  - url: https://YOUR_API_GATEWAY_URL
    description: AWS API Gateway

security:
  - BearerAuth: []

paths:
  /boards:
    get:
      operationId: listBoards
      summary: List all available Miro boards
      description: Returns all boards visible to the configured Miro token, optionally filtered by team or owner.
      responses:
        "200":
          description: List of boards
          content:
            application/json:
              schema:
                type: object
                properties:
                  boards:
                    type: array
                    items:
                      $ref: "#/components/schemas/Board"

  /boards/{boardId}/frames:
    get:
      operationId: getFrames
      summary: Get all frames from a board
      description: Returns all frame items on the specified Miro board. Frames are containers that group other items.
      parameters:
        - $ref: "#/components/parameters/boardId"
      responses:
        "200":
          description: List of frames
          content:
            application/json:
              schema:
                type: object
                properties:
                  frames:
                    type: array
                    items:
                      type: object

  /boards/{boardId}/frames/{frameId}/items:
    get:
      operationId: getItemsInFrame
      summary: Get all items inside a specific frame
      description: Returns all items contained within the specified frame on a Miro board.
      parameters:
        - $ref: "#/components/parameters/boardId"
        - name: frameId
          in: path
          required: true
          schema:
            type: string
          description: ID of the frame
      responses:
        "200":
          description: List of items in the frame
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object

  /boards/{boardId}/access:
    get:
      operationId: getBoardAccess
      summary: Get board access and sharing information
      description: Returns sharing policy, permissions policy, and list of members with their roles for the specified board.
      parameters:
        - $ref: "#/components/parameters/boardId"
      responses:
        "200":
          description: Board access information
          content:
            application/json:
              schema:
                type: object
                properties:
                  board:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                  sharingPolicy:
                    $ref: "#/components/schemas/SharingPolicy"
                  permissionsPolicy:
                    type: object
                  members:
                    type: array
                    items:
                      $ref: "#/components/schemas/Member"

  /boards/{boardId}/share-link:
    get:
      operationId: getBoardShareLink
      summary: Get the board view link
      description: Returns the board's direct view URL. Note — this is the API viewLink, not the UI-generated share link with share_link_id.
      parameters:
        - $ref: "#/components/parameters/boardId"
      responses:
        "200":
          description: Board view link
          content:
            application/json:
              schema:
                type: object
                properties:
                  board:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                  viewLink:
                    type: string
                    description: Direct URL to view the board
                  linkAccess:
                    type: string
                    description: API-level link access setting

  /boards/{boardId}/sticky-notes:
    post:
      operationId: createStickyNote
      summary: Create a sticky note on a board
      description: |
        Create a sticky note with optional size presets.
        Size presets (each ~2x the previous): klitzeklein (325px), klein (650px), medium (1300px), mittelgroß (2600px), groß (5600px), riesengroß (11200px).
        Using a size preset automatically sets shape to 'rectangle'.
        Use 'size' for presets or 'width' for custom pixel width.
      parameters:
        - $ref: "#/components/parameters/boardId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStickyNoteRequest"
      responses:
        "201":
          description: Sticky note created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  shape:
                    type: string

  /boards/{boardId}/items/bulk:
    post:
      operationId: bulkCreateItems
      summary: Create multiple items in a single request
      description: |
        Create up to 20 items on a board in one transaction.
        Supports sticky_note, shape, text, frame, card, and more.
        For sticky notes, use the 'size' shorthand (same presets as createStickyNote) or 'color' shorthand for style.fillColor.
      parameters:
        - $ref: "#/components/parameters/boardId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkCreateItemsRequest"
      responses:
        "201":
          description: Items created
          content:
            application/json:
              schema:
                type: object
                properties:
                  created:
                    type: integer
                  items:
                    type: array
                    items:
                      type: object

  /boards/{boardId}/shapes:
    post:
      operationId: createShape
      summary: Create a shape on a board
      description: |
        Create a shape (rectangle, circle, flowchart elements, etc.) on a Miro board.
        Default geometry is 200x200 pixels.
      parameters:
        - $ref: "#/components/parameters/boardId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateShapeRequest"
      responses:
        "201":
          description: Shape created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  shape:
                    type: string

  /boards/{boardId}/sharing:
    patch:
      operationId: updateBoardSharing
      summary: Update board sharing policy
      description: |
        Configure board access, team access, and organization access levels.
        Note: inviteToAccountAndBoardLinkAccess may be restricted by organization settings.
      parameters:
        - $ref: "#/components/parameters/boardId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSharingRequest"
      responses:
        "200":
          description: Sharing policy updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  board:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                  sharingPolicy:
                    $ref: "#/components/schemas/SharingPolicy"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: API key for authentication

  parameters:
    boardId:
      name: boardId
      in: path
      required: true
      schema:
        type: string
      description: ID of the Miro board

  schemas:
    Board:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        owner:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
        team:
          type: object
          properties:
            id:
              type: string
            name:
              type: string

    Member:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [owner, coowner, editor, commenter, viewer]

    SharingPolicy:
      type: object
      properties:
        access:
          type: string
          enum: [private, view, comment, edit]
        teamAccess:
          type: string
          enum: [private, view, comment, edit]
        organizationAccess:
          type: string
          enum: [private, view, comment, edit]
        inviteToAccountAndBoardLinkAccess:
          type: string
          enum: [viewer, commenter, editor, no_access]

    CreateStickyNoteRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          description: Text content of the sticky note
        color:
          type: string
          enum: [gray, light_yellow, yellow, orange, light_green, green, dark_green, cyan, light_pink, pink, violet, red, light_blue, blue, dark_blue, black]
          default: yellow
          description: Color of the sticky note
        x:
          type: number
          default: 0
          description: X coordinate position
        y:
          type: number
          default: 0
          description: Y coordinate position
        size:
          type: string
          enum: [klitzeklein, klein, medium, mittelgroß, groß, riesengroß]
          description: "Named size preset. Sets shape to rectangle automatically. Sizes: klitzeklein=325px, klein=650px, medium=1300px, mittelgroß=2600px, groß=5600px, riesengroß=11200px"
        width:
          type: number
          description: Custom width in pixels (overrides size preset if both provided)
        shape:
          type: string
          enum: [square, rectangle]
          default: square
          description: "Sticky note shape: square (1:1.15 ratio) or rectangle (1:0.65 ratio)"
        parentId:
          type: string
          description: ID of the parent frame. Coordinates become relative to the frame.

    BulkCreateItemsRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          maxItems: 20
          description: Array of items to create (max 20)
          items:
            type: object
            required: [type]
            properties:
              type:
                type: string
                enum: [app_card, text, shape, sticky_note, image, document, card, frame, embed]
                description: Type of item to create
              data:
                type: object
                description: Item-specific data configuration
              style:
                type: object
                description: Item-specific style configuration
              position:
                type: object
                description: "Item position {x, y}"
                properties:
                  x:
                    type: number
                  y:
                    type: number
              geometry:
                type: object
                description: Item geometry configuration
              parent:
                type: object
                description: "Parent frame: {id: frameId}"
                properties:
                  id:
                    type: string
              size:
                type: string
                enum: [klitzeklein, klein, medium, mittelgroß, groß, riesengroß]
                description: Size preset for sticky notes (auto-sets shape to rectangle)
              width:
                type: number
                description: Custom width for sticky notes
              color:
                type: string
                description: Shorthand for style.fillColor

    CreateShapeRequest:
      type: object
      properties:
        shape:
          type: string
          default: rectangle
          description: Shape type (rectangle, circle, triangle, rhombus, cloud, flow_chart_decision, etc.)
          enum: [rectangle, round_rectangle, circle, triangle, rhombus, parallelogram, trapezoid, pentagon, hexagon, octagon, wedge_round_rectangle_callout, star, flow_chart_predefined_process, cloud, cross, can, right_arrow, left_arrow, left_right_arrow, left_brace, right_brace, flow_chart_connector, flow_chart_magnetic_disk, flow_chart_input_output, flow_chart_decision, flow_chart_delay, flow_chart_display, flow_chart_document, flow_chart_magnetic_drum, flow_chart_internal_storage, flow_chart_manual_input, flow_chart_manual_operation, flow_chart_merge, flow_chart_multidocuments, flow_chart_note_curly_left, flow_chart_note_curly_right, flow_chart_note_square, flow_chart_offpage_connector, flow_chart_or, flow_chart_predefined_process_2, flow_chart_preparation, flow_chart_process, flow_chart_online_storage, flow_chart_summing_junction, flow_chart_terminator]
        content:
          type: string
          description: Text content to display on the shape
        style:
          type: object
          description: Style configuration
          properties:
            borderColor:
              type: string
            borderOpacity:
              type: number
            borderStyle:
              type: string
              enum: [normal, dotted, dashed]
            borderWidth:
              type: number
            color:
              type: string
            fillColor:
              type: string
            fillOpacity:
              type: number
            fontFamily:
              type: string
            fontSize:
              type: number
            textAlign:
              type: string
              enum: [left, center, right]
            textAlignVertical:
              type: string
              enum: [top, middle, bottom]
        position:
          type: object
          properties:
            x:
              type: number
              default: 0
            y:
              type: number
              default: 0
        geometry:
          type: object
          properties:
            width:
              type: number
              default: 200
            height:
              type: number
              default: 200
            rotation:
              type: number
              default: 0

    UpdateSharingRequest:
      type: object
      properties:
        access:
          type: string
          enum: [private, view, comment, edit]
          description: Board access level
        teamAccess:
          type: string
          enum: [private, view, comment, edit]
          description: Team access level
        organizationAccess:
          type: string
          enum: [private, view, comment, edit]
          description: Organization access level
        inviteToAccountAndBoardLinkAccess:
          type: string
          enum: [viewer, commenter, editor, no_access]
          description: Access level for anyone with the board link
