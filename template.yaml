AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Miro Board Tools REST API - adapter for GPT Actions and other LLM integrations

Globals:
  Function:
    Timeout: 30
    Runtime: nodejs24.x
    MemorySize: 256

Parameters:
  MiroTeamId:
    Type: String
    Default: ""
    Description: Optional Miro team ID to filter boards
  MiroClientId:
    Type: String
    Default: ""
    Description: Miro OAuth App Client ID (for MCP OAuth proxy)
  MiroClientSecret:
    Type: String
    Default: ""
    NoEcho: true
    Description: Miro OAuth App Client Secret (for MCP OAuth proxy)

Resources:
  MiroRestApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - POST
          - PATCH
          - OPTIONS
        AllowHeaders:
          - Authorization
          - Content-Type

  MiroRestFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: lambda.handler
      CodeUri: dist/
      AutoPublishAlias: live
      ReservedConcurrentExecutions: 50
      Environment:
        Variables:
          MIRO_TEAM_ID: !Ref MiroTeamId
      Events:
        Health:
          Type: HttpApi
          Properties:
            ApiId: !Ref MiroRestApi
            Path: /health
            Method: GET
        ListBoards:
          Type: HttpApi
          Properties:
            ApiId: !Ref MiroRestApi
            Path: /boards
            Method: GET
        GetFrames:
          Type: HttpApi
          Properties:
            ApiId: !Ref MiroRestApi
            Path: /boards/{boardId}/frames
            Method: GET
        GetItemsInFrame:
          Type: HttpApi
          Properties:
            ApiId: !Ref MiroRestApi
            Path: /boards/{boardId}/frames/{frameId}/items
            Method: GET
        GetBoardAccess:
          Type: HttpApi
          Properties:
            ApiId: !Ref MiroRestApi
            Path: /boards/{boardId}/access
            Method: GET
        GetBoardShareLink:
          Type: HttpApi
          Properties:
            ApiId: !Ref MiroRestApi
            Path: /boards/{boardId}/share-link
            Method: GET
        CreateStickyNote:
          Type: HttpApi
          Properties:
            ApiId: !Ref MiroRestApi
            Path: /boards/{boardId}/sticky-notes
            Method: POST
        BulkCreateItems:
          Type: HttpApi
          Properties:
            ApiId: !Ref MiroRestApi
            Path: /boards/{boardId}/items/bulk
            Method: POST
        CreateShape:
          Type: HttpApi
          Properties:
            ApiId: !Ref MiroRestApi
            Path: /boards/{boardId}/shapes
            Method: POST
        UpdateBoardSharing:
          Type: HttpApi
          Properties:
            ApiId: !Ref MiroRestApi
            Path: /boards/{boardId}/sharing
            Method: PATCH

  MiroMcpFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: mcp-lambda.handler
      CodeUri: dist/
      AutoPublishAlias: live
      ReservedConcurrentExecutions: 50
      Environment:
        Variables:
          MIRO_CLIENT_ID: !Ref MiroClientId
          MIRO_CLIENT_SECRET: !Ref MiroClientSecret
      Events:
        McpPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref MiroRestApi
            Path: /mcp
            Method: POST
        McpGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref MiroRestApi
            Path: /mcp
            Method: GET
        McpDelete:
          Type: HttpApi
          Properties:
            ApiId: !Ref MiroRestApi
            Path: /mcp
            Method: DELETE
        OAuthResourceMetadata:
          Type: HttpApi
          Properties:
            ApiId: !Ref MiroRestApi
            Path: /oauth/resource-metadata
            Method: GET
        OidcDiscovery:
          Type: HttpApi
          Properties:
            ApiId: !Ref MiroRestApi
            Path: /.well-known/openid-configuration
            Method: GET
        OAuthRegister:
          Type: HttpApi
          Properties:
            ApiId: !Ref MiroRestApi
            Path: /oauth/register
            Method: POST
        OAuthAuthorize:
          Type: HttpApi
          Properties:
            ApiId: !Ref MiroRestApi
            Path: /oauth/authorize
            Method: GET
        OAuthToken:
          Type: HttpApi
          Properties:
            ApiId: !Ref MiroRestApi
            Path: /oauth/token
            Method: POST

Outputs:
  ApiUrl:
    Description: API Gateway URL
    Value: !Sub "https://${MiroRestApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
  FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt MiroRestFunction.Arn
  McpUrl:
    Description: MCP Streamable HTTP endpoint URL
    Value: !Sub "https://${MiroRestApi}.execute-api.${AWS::Region}.amazonaws.com/prod/mcp"
  McpFunctionArn:
    Description: MCP Lambda function ARN
    Value: !GetAtt MiroMcpFunction.Arn
