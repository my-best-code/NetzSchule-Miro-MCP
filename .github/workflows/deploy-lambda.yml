name: Deploy REST API

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - run: npm ci
      - run: npm test
      - run: npm run build:lambda

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-central-1

      - uses: aws-actions/setup-sam@v2

      - run: sam build --no-use-container

      - name: Clean up failed stack if in ROLLBACK_COMPLETE
        run: |
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name miro-mcp-rest-api \
            --query "Stacks[0].StackStatus" \
            --output text 2>/dev/null || echo "NOT_FOUND")
          if [ "$STATUS" = "ROLLBACK_COMPLETE" ]; then
            echo "Stack is in ROLLBACK_COMPLETE — deleting before redeploy..."
            aws cloudformation delete-stack --stack-name miro-mcp-rest-api
            aws cloudformation wait stack-delete-complete --stack-name miro-mcp-rest-api
            echo "Stack deleted."
          fi

      - run: |
          sam deploy \
            --stack-name miro-mcp-rest-api \
            --s3-bucket ${{ secrets.SAM_BUCKET }} \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              MiroTeamId=${{ secrets.MIRO_TEAM_ID }}
