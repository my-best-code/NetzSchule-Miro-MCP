name: Deploy REST API

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - run: npm ci
      - run: npm test
      - run: npm run build:lambdas

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-central-1

      - uses: aws-actions/setup-sam@v2

      - run: sam build --no-use-container

      - name: Clean up failed stack state
        run: |
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name miro-mcp-rest-api \
            --query "Stacks[0].StackStatus" \
            --output text 2>/dev/null || echo "NOT_FOUND")
          echo "Current stack status: $STATUS"
          if [ "$STATUS" = "ROLLBACK_COMPLETE" ]; then
            echo "Stack is in ROLLBACK_COMPLETE — deleting before redeploy..."
            aws cloudformation delete-stack --stack-name miro-mcp-rest-api
            aws cloudformation wait stack-delete-complete --stack-name miro-mcp-rest-api
            echo "Stack deleted."
          elif [ "$STATUS" = "UPDATE_ROLLBACK_FAILED" ]; then
            echo "Stack is in UPDATE_ROLLBACK_FAILED — continuing rollback..."
            aws cloudformation continue-update-rollback \
              --stack-name miro-mcp-rest-api \
              --resources-to-skip RestFunction5xxAlarm McpFunction5xxAlarm \
                RestFunctionThrottlesAlarm RestFunctionLatencyAlarm ApiGateway5xxAlarm
            aws cloudformation wait stack-rollback-complete --stack-name miro-mcp-rest-api
            echo "Rollback completed."
          fi

      - run: |
          sam deploy \
            --stack-name miro-mcp-rest-api \
            --s3-bucket ${{ secrets.SAM_BUCKET }} \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              MiroTeamId=${{ secrets.MIRO_TEAM_ID }} \
              MiroClientId=${{ secrets.MCP_MIRO_CLIENT_ID }} \
              MiroClientSecret=${{ secrets.MCP_MIRO_CLIENT_SECRET }}

      - name: Smoke test
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name miro-mcp-rest-api \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)
          echo "Testing $API_URL/health ..."
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' "$API_URL/health")
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test FAILED: GET /health returned $STATUS"
            exit 1
          fi
          echo "Smoke test passed (HTTP $STATUS)"
